<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>GitHub Felhasználó Keresés</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .search-box { margin-bottom: 20px; }
        .user-card { 
            display: inline-block; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            padding: 10px; 
            margin: 10px; 
            text-align: center;
            width: 150px;
        }
        .user-card img { 
            width: 100px; 
            height: 100px; 
            border-radius: 50%; 
        }
        #results { display: flex; flex-wrap: wrap; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Főoldal</a> | 
        <a href="user-search.html">Felhasználó kereső</a> | 
        <a href="repo-search.html">Repo kereső</a>
    </nav>

    <h2>GitHub Felhasználó Kereső</h2>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Írd be a felhasználónevet...">
        <button onclick="searchUsers()">Keresés</button>
    </div>

    <div id="results"></div>

    <script>
        async function searchUsers() {
            const query = document.getElementById('searchInput').value.trim();
            const resultsDiv = document.getElementById('results');
            
            if (query === "") {
                alert("Kérlek, adj meg egy keresőkifejezést!");
                return;
            }

            resultsDiv.innerHTML = "Betöltés...";

            try {

                const response = await fetch(`https://api.github.com/search/users?q=${query}`);
                
                if (!response.ok) {
                    throw new Error("Hiba történt a lekérdezés során.");
                }

                const data = await response.json();
                resultsDiv.innerHTML = ""; 

                if (data.items.length === 0) {
                    resultsDiv.innerHTML = "Nincs találat.";
                    return;
                }

                data.items.forEach(user => {
                    const card = document.createElement('div');
                    card.className = 'user-card';
                    
                    card.innerHTML = `
                        <img src="${user.avatar_url}" alt="${user.login}">
                        <p><strong>${user.login}</strong></p>
                        <a href="${user.html_url}" target="_blank">Profil</a>
                    `;
                    
                    resultsDiv.appendChild(card);
                });

            } catch (error) {
                alert("Hiba: " + error.message);
                resultsDiv.innerHTML = "";
            }
        }
    </script>
</body>
</html>
