<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>GitHub Repo Keresés</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .search-box { margin-bottom: 20px; }
        .repo-card { 
            display: inline-block; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            padding: 10px; 
            margin: 10px; 
            text-align: center;
            width: 150px;
            vertical-align: top;
        }
        .repo-card img { 
            width: 100px; 
            height: 100px; 
            border-radius: 50%; 
        }
        #results { display: flex; flex-wrap: wrap; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Főoldal</a> | 
        <a href="user-search.html">Felhasználó kereső</a> | 
        <a href="repo-search.html">Repo kereső</a>
    </nav>

    <h2>GitHub Repository Kereső</h2>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Repo neve...">
        <button onclick="searchRepos()">Keresés</button>
    </div>

    <div id="results"></div>

    <script>
        async function searchRepos() {
            const query = document.getElementById('searchInput').value.trim();
            const resultsDiv = document.getElementById('results');
            
            if (query === "") {
                alert("Kérlek, adj meg egy keresőkifejezést!");
                return;
            }

            resultsDiv.innerHTML = "Betöltés...";

            try {
                const response = await fetch(`https://api.github.com/search/repositories?q=${query}`);
                const data = await response.json();
                resultsDiv.innerHTML = "";

                if (data.items.length === 0) {
                    resultsDiv.innerHTML = "Nincs találat.";
                    return;
                }

                data.items.forEach(repo => {
                    const card = document.createElement('div');
                    card.className = 'repo-card';
                    
                    card.innerHTML = `
                        <img src="${repo.owner.avatar_url}" alt="owner">
                        <p><strong>${repo.name}</strong></p>
                        <a href="${repo.html_url}" target="_blank">Megtekintés</a>
                    `;
                    
                    resultsDiv.appendChild(card);
                });

            } catch (error) {
                alert("Hiba történt a lekérdezés során.");
                resultsDiv.innerHTML = "";
            }
        }
    </script>
</body>
</html>
